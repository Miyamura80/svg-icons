<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <!-- Mask: punch chunks out of the outer body silhouette -->
    <mask id="chunkMask" maskUnits="userSpaceOnUse" x="0" y="0" width="256" height="256">
      <rect width="256" height="256" fill="#ffffff"/>
      <g fill="#000000">
        <rect x="50" y="80" width="20" height="14"/>
        <rect x="48" y="94" width="12" height="10"/>
        <rect x="186" y="90" width="18" height="12"/>
        <rect x="200" y="102" width="10" height="10"/>
        <rect x="32" y="160" width="14" height="20"/>
        <rect x="46" y="170" width="8" height="14"/>
        <rect x="100" y="222" width="30" height="14"/>
        <rect x="130" y="225" width="20" height="10"/>
      </g>
    </mask>
  </defs>

  <!-- Antenna broken — bottom half missing, fragments scattered -->
  <circle cx="128" cy="24" r="10" fill="none" stroke="#000000" stroke-width="6"/>
  <rect x="125" y="34" width="6" height="8" fill="#000000"/>
  <rect x="120" y="48" width="4" height="4" fill="#000000"/>
  <rect x="135" y="55" width="3" height="3" fill="#000000"/>

  <!-- Body using vanilla's even-odd path (face transparent), with chunks punched out -->
  <path fill-rule="evenodd" fill="#000000" mask="url(#chunkMask)"
        d="M40,144a88,88,0,0,1,176,0v44a44,44,0,0,1-44,44H84a44,44,0,0,1-44-44Z M92,116 h72 a28,28 0 0 1 28,28 v24 a28,28 0 0 1 -28,28 h-72 a28,28 0 0 1 -28,-28 v-24 a28,28 0 0 1 28,-28 z"/>

  <!-- Eyes: black pills (matching vanilla) -->
  <rect x="88" y="138" width="24" height="36" rx="12" fill="#000000"/>
  <rect x="144" y="138" width="24" height="36" rx="12" fill="#000000"/>

  <!-- Shattered eye fractures: bold black cross-cracks across the face zone -->
  <g stroke="#000000" stroke-width="3" stroke-linecap="round">
    <!-- Left eye: vertical crack through, with horizontal offshoot -->
    <line x1="100" y1="130" x2="100" y2="184"/>
    <line x1="100" y1="156" x2="118" y2="156"/>
    <!-- Right eye: vertical crack with horizontal offshoot the other way -->
    <line x1="156" y1="130" x2="156" y2="184"/>
    <line x1="138" y1="160" x2="156" y2="160"/>
  </g>

  <!-- Falling shattered fragments around the figure -->
  <g fill="#000000">
    <rect x="60" y="240" width="14" height="10"/>
    <rect x="100" y="245" width="10" height="8"/>
    <rect x="160" y="242" width="16" height="12"/>
    <rect x="195" y="248" width="8" height="6"/>
    <rect x="10" y="190" width="12" height="8"/>
    <rect x="6" y="210" width="8" height="6"/>
    <rect x="240" y="180" width="10" height="8"/>
    <rect x="248" y="200" width="6" height="6"/>
    <rect x="100" y="60" width="8" height="6"/>
    <rect x="155" y="65" width="6" height="4"/>
  </g>
</svg>
